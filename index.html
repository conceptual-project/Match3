<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#fff;font-family:'Inter',sans-serif;user-select:none;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px}
.top-bar{display:flex;align-items:flex-end;justify-content:center;width:100%;position:relative}
.title-row{display:flex;align-items:center;justify-content:center;gap:5px}
.title-cube{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;font-family:'Inter',sans-serif;font-weight:900;font-size:22px;color:#fff;border-radius:5px;text-shadow:1px 1px 2px rgba(0,0,0,.4);position:relative;user-select:none;outline:1px solid rgba(255,255,255,.25);outline-offset:-2px}
.title-cube::before{content:'';position:absolute;top:2px;left:2px;right:2px;height:36%;background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,0) 100%);border-radius:3px 3px 0 0;pointer-events:none}
.title-cube::after{content:'';position:absolute;bottom:2px;left:2px;right:2px;height:33%;background:linear-gradient(0deg,rgba(0,0,0,.2) 0%,transparent 100%);border-radius:0 0 3px 3px;pointer-events:none}
.btn-row{display:flex;gap:6px}
.tbtn{flex:1;background:rgba(20,20,30,.75);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#888;font-family:'Inter',sans-serif;font-size:.6rem;font-weight:bold;letter-spacing:.08em;padding:6px 0;cursor:pointer;transition:background .15s,color .15s;text-align:center}
.tbtn:hover{background:rgba(255,255,255,.1);color:#ccc}
.tbtn.sound-on{background:rgba(200,168,232,.08);border-color:rgba(200,168,232,.2);color:#c8a8e8}
.tbtn.sound-off{background:rgba(20,20,30,.75);border-color:rgba(255,255,255,.08);color:#666}
/* game frame */
.game-frame{position:relative;border:2px solid #555;border-radius:16px;padding:16px 20px 20px;background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;gap:32px}
.game-frame::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:130px;height:4px;background:#0d0d0d;z-index:1}
.frame-label{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:#0d0d0d;padding:0 5px;font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.5px;color:#555;z-index:2;white-space:nowrap}
.frame-label .bold{font-weight:700;color:#777}
.main-row{display:flex;gap:24px;align-items:flex-start}
.board-wrap{position:relative;border-radius:6px;padding:4px;background:rgba(20,20,30,.75);border:1px solid rgba(255,255,255,.08)}
.board-wrap canvas{display:block;border-radius:4px;touch-action:none;border:none;cursor:pointer}
.stat-box{border-radius:6px;padding:10px;background:rgba(20,20,30,.75);border:1px solid rgba(255,255,255,.08)}
.stat-box .label{font-size:.65rem;color:#888;text-transform:uppercase;letter-spacing:.15em;margin-bottom:2px}
.stat-box .value{font-weight:bold;font-size:1.1rem;color:#fff}
.stat-box .value.purple{color:#c8a8e8}
.stat-box .value.green{color:#b8e8c8}
.stat-box .value.red{color:#f0a8b8}
.stat-box .value.yellow{color:#fce4a8}
#targetBox .targetRow{display:flex;align-items:center;gap:8px}
#targetBox .colorSwatch{width:16px;height:16px;border-radius:3px}
#targetBox .progressWrap{margin-top:6px;width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#targetBox .progressBar{height:100%;border-radius:2px;transition:width .3s}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,10,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:10;border-radius:4px}
.overlay h2{font-family:'Inter',sans-serif;font-weight:900;font-size:1.2rem;margin-bottom:8px}
.overlay p{font-size:.7rem;margin-bottom:8px;color:#ccc}
.overlay .hint{font-size:.6rem;color:#666}
.overlay-btn{padding:12px 32px;border:none;font-weight:900;cursor:pointer;border-radius:6px;background:linear-gradient(180deg,#d4f4e0 0%,#b8e8c8 35%,#90d0a8 70%,#70b088 100%);color:#fff;font-family:'Inter',sans-serif;font-size:1.1rem;text-shadow:1px 1px 2px rgba(0,0,0,.3);outline:1px solid rgba(255,255,255,.25);outline-offset:-2px;box-shadow:0 3px 6px rgba(0,0,0,.3);transition:transform .15s}
.overlay-btn:hover{transform:scale(1.05)}
.overlay-btn.next-btn{background:linear-gradient(180deg,#d0eef8 0%,#a8d8ea 35%,#88c8dc 70%,#68a8bc 100%)}
#pauseOverlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,10,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:15;border-radius:4px;cursor:pointer}
#pauseOverlay .pauseTitle{font-family:'Inter',sans-serif;font-weight:900;font-size:1.2rem;color:#c8a8e8}
#pauseOverlay .pauseHint{margin-top:12px;font-size:.6rem;color:#666}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-anim{animation:pulse 1s ease-in-out infinite}
#bonusText{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;font-size:1.3rem;font-weight:bold;font-family:'Inter',sans-serif;color:#fff;white-space:nowrap;text-shadow:0 0 3px #000,2px 2px 4px rgba(0,0,0,.9),-2px -2px 4px rgba(0,0,0,.9),0 0 18px rgba(252,228,168,.7),0 0 40px rgba(252,228,168,.35)}
.lb{width:85%;max-width:320px;max-height:220px;overflow-y:auto;margin-bottom:12px;scrollbar-width:thin;scrollbar-color:rgba(200,168,232,.3) transparent}
.lbTitle{font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.15em;text-align:center;margin-bottom:8px}
.lbEmpty{color:#555;font-size:.6rem;text-align:center;padding:10px 0}
.lbRow{display:flex;gap:8px;align-items:center;margin-bottom:3px;font-size:.7rem;padding:2px 6px;border-radius:3px}
.lbRow.even{background:rgba(255,255,255,.03)}
.lbRow.hi{color:#fff;font-weight:bold}
.lbRow:not(.hi){color:#bbb}
.lbRow .rank{min-width:18px;text-align:right;font-variant-numeric:tabular-nums}
.lbRow .sc{font-variant-numeric:tabular-nums}
.lbRow .lv{color:#888;font-size:.6rem}
.lbRow .dt{color:#555;font-size:.55rem;margin-left:auto}
</style>

<body>

<div class="game-frame">
<div class="top-bar">
  <div id="titleRow" class="title-row"></div>
</div>
<div class="main-row">
  <div class="board-wrap" id="boardWrap">
    <canvas id="cv"></canvas>
    <div id="bonusText" style="display:none"></div>
    <div id="startOverlay" class="overlay">
      <div class="lb" id="startLB"></div>
      <button class="overlay-btn" id="btnPlay">ИГРАТЬ</button>
    </div>
    <div id="gameoverOverlay" class="overlay" style="display:none">
      <h2 style="color:#f0a8b8" id="goTitle">КОНЕЦ ИГРЫ</h2>

  </div>

  <div class="right-panel" style="display:flex;flex-direction:column;gap:10px;min-width:150px">
    <div class="btn-row">
      <button class="tbtn" id="btnPause"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></button>
      <button class="tbtn" id="btnLang">EN</button>
      <button class="tbtn" id="btnSound"></button>
    </div>
    <div class="stat-box" id="scoreBox">
      <div class="label" id="scoreLabel">Счёт</div>
      <div class="value" id="scoreValue">0</div>
    </div>
    <div class="stat-box" id="levelBox">
      <div class="label" id="levelLabel">Уровень</div>
      <div class="value purple" id="levelValue">1</div>
    </div>
    <div class="stat-box" id="timeBox">
      <div class="label" id="timeLabel">Время</div>
      <div class="value green" id="timeValue">100</div>
    </div>
    <div class="stat-box" id="targetBox">
      <div class="label" id="targetLabel">Цель</div>
      <div class="targetRow">
        <div class="colorSwatch" id="targetSwatch"></div>
        <span id="targetValue" style="font-size:1rem;font-weight:bold;font-variant-numeric:tabular-nums">0/8</span>
      </div>
      <div class="progressWrap"><div class="progressBar" id="targetProgress"></div></div>
    </div>
  </div>
</div>
<div class="frame-label">conceptual<span class="bold">project</span></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const COLS = 8, ROWS = 13, CELL = 36, GAP = 2, CELL_FULL = CELL + GAP
const BW = COLS * CELL_FULL + GAP, BH = ROWS * CELL_FULL + GAP
const NUM_COLORS = 5, LEVEL_TIME = 100
const LB_KEY = 'match3_leaderboard', LB_MAX = 10
const LANG_KEY = 'match3_lang', SOUND_KEY = 'match3_sound'

const COLORS = [
  { base:'#a8d8ea', light:'#d0eef8', mid:'#88c8dc', dark:'#68a8bc', glow:[168,216,234] },
  { base:'#fce4a8', light:'#fef0cc', mid:'#f0d080', dark:'#d4b058', glow:[252,228,168] },
  { base:'#d4b8e8', light:'#e8d4f4', mid:'#b898d0', dark:'#9878b0', glow:[212,184,232] },
  { base:'#b8e8c8', light:'#d4f4e0', mid:'#90d0a8', dark:'#70b088', glow:[184,232,200] },
  { base:'#f0b8c0', light:'#f8d4d8', mid:'#e09098', dark:'#c87078', glow:[240,184,192] },
]

const TITLE_PIECE_COLORS = [COLORS[0], COLORS[1], COLORS[2], COLORS[3], COLORS[4], COLORS[0], COLORS[1]]

// ═══════════════════════════════════════════════════
// LOCALIZATION
// ═══════════════════════════════════════════════════
const LOC = {
  play:{ru:'ИГРАТЬ',en:'PLAY'},restart:{ru:'ЗАНОВО',en:'RESTART'},
  gameOver:{ru:'КОНЕЦ ИГРЫ',en:'GAME OVER'},levelComplete:{ru:'УРОВЕНЬ ПРОЙДЕН!',en:'LEVEL COMPLETE!'},
  score:{ru:'Счёт',en:'Score'},level:{ru:'Уровень',en:'Level'},time:{ru:'Время',en:'Time'},
  target:{ru:'Цель',en:'Target'},leaderboard:{ru:'Топ-10',en:'Top-10'},
  noRecords:{ru:'Пока нет рекордов',en:'No records yet'},nextLevel:{ru:'ДАЛЕЕ',en:'NEXT'},
  noMoves:{ru:'НЕТ ХОДОВ — ПЕРЕМЕШИВАЕМ',en:'NO MOVES — SHUFFLING'},
  cascade:{ru:'КАСКАД ×',en:'CASCADE ×'},pause:{ru:'ПАУЗА',en:'PAUSE'},
  pauseHint:{ru:'коснись чтобы продолжить',en:'tap to resume'},
}
function l(k){ return LOC[k]?.[lang] || LOC[k]?.ru || k }

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
let lang = 'ru'
let soundOn = true
let grid = [], selected = null, phase = { type: 'idle' }
let particles = [], active = false, score = 0, collected = 0
let level = 1, cascadeCount = 0, uiTime = LEVEL_TIME
let paused = false, timeAtPause = 0
let bonusTextStr = '', bonusTimeout = null, pendingLevelComplete = false
let timerInterval = null
let uiTargetColor = 0, uiTargetCount = 8, uiCollected = 0
let overlayState = 'start' // 'start' | 'gameover' | 'levelComplete' | 'none'

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function randomColor(){ return Math.floor(Math.random() * NUM_COLORS) }

function fillGridNoMatches(){
  const g = []
  for(let r=0;r<ROWS;r++){
    g[r]=[]
    for(let c=0;c<COLS;c++){
      const forbidden = new Set()
      if(c>=2 && g[r][c-1]===g[r][c-2]) forbidden.add(g[r][c-1])
      if(r>=2 && g[r-1][c]===g[r-2][c]) forbidden.add(g[r-1][c])
      let color = randomColor(), attempts = 0
      while(forbidden.has(color) && attempts<30){ color=randomColor(); attempts++ }
      g[r][c] = color
    }
  }
  return g
}

function findMatches(g){
  const matched = new Set()
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;c++){
      if(g[r][c]===g[r][c+1] && g[r][c]===g[r][c+2]){
        let end=c+2
        while(end+1<COLS && g[r][end+1]===g[r][c]) end++
        for(let i=c;i<=end;i++) matched.add(r+','+i)
        c=end
      }
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;r++){
      if(g[r][c]===g[r+1][c] && g[r][c]===g[r+2][c]){
        let end=r+2
        while(end+1<ROWS && g[end+1][c]===g[r][c]) end++
        for(let i=r;i<=end;i++) matched.add(i+','+c)
        r=end
      }
    }
  }
  return matched
}

function applyGravity(g){
  const moves=[]
  for(let c=0;c<COLS;c++){
    let wr=ROWS-1
    for(let r=ROWS-1;r>=0;r--){
      if(g[r][c]!==null){
        if(r!==wr){ g[wr][c]=g[r][c]; g[r][c]=null; moves.push({col:c,fromRow:r,toRow:wr,color:g[wr][c]}) }
        wr--
      }
    }
  }
  return moves
}

function fillEmpty(g){
  const filled=[]
  for(let c=0;c<COLS;c++){
    let ec=0
    for(let r=0;r<ROWS;r++) if(g[r][c]===null) ec++
    let idx=0
    for(let r=0;r<ROWS;r++){
      if(g[r][c]===null){
        const color=randomColor(); g[r][c]=color
        filled.push({col:c,row:r,color,fromAbove:-(ec-idx)}); idx++
      }
    }
  }
  return filled
}

function hasValidMoves(g){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(c+1<COLS){
        const tmp=g[r][c]; g[r][c]=g[r][c+1]; g[r][c+1]=tmp
        const ok=findMatches(g).size>0
        g[r][c+1]=g[r][c]; g[r][c]=tmp
        if(ok) return true
      }
      if(r+1<ROWS){
        const tmp=g[r][c]; g[r][c]=g[r+1][c]; g[r+1][c]=tmp
        const ok=findMatches(g).size>0
        g[r+1][c]=g[r][c]; g[r][c]=tmp
        if(ok) return true
      }
    }
  }
  return false
}

function getLevelTarget(lv){
  const ci=(lv-1)%NUM_COLORS
  const counts=[8,10,13,16,20,24,28,32,37,42]
  const count=lv-1<counts.length?counts[lv-1]:(20+lv*4)
  return {colorIdx:ci,count}
}

// ═══════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════
function loadLB(){
  try{ const d=localStorage.getItem(LB_KEY); if(d) return JSON.parse(d).slice(0,LB_MAX) }catch{}
  return []
}
function saveLB(lb){ try{ localStorage.setItem(LB_KEY,JSON.stringify(lb)) }catch{} }
function addLB(sc,lv){
  const lb=loadLB()
  const entry={score:sc,level:lv,date:new Date().toLocaleDateString(lang==='ru'?'ru-RU':'en-US')}
  lb.push(entry); lb.sort((a,b)=>b.score-a.score)
  if(lb.length>LB_MAX) lb.length=LB_MAX
  saveLB(lb)
  return {lb,hi:lb.indexOf(entry)}
}

// ═══════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════
const cv = document.getElementById('cv')
const ctx = cv.getContext('2d')
cv.width = BW; cv.height = BH

function rrect(ctx,x,y,w,h,radii){
  let tl,tr,br,bl
  if(Array.isArray(radii)){ [tl,tr,br,bl]=radii }
  else{ tl=tr=br=bl=radii }
  ctx.beginPath()
  ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y)
  ctx.quadraticCurveTo(x+w,y,x+w,y+tr)
  ctx.lineTo(x+w,y+h-br)
  ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h)
  ctx.lineTo(x+bl,y+h)
  ctx.quadraticCurveTo(x,y+h,x,y+h-bl)
  ctx.lineTo(x,y+tl)
  ctx.quadraticCurveTo(x,y,x+tl,y)
  ctx.closePath()
}

function drawCube(ctx,px,py,ci,sz,sel,alpha){
  const co=COLORS[ci], r=4
  ctx.save(); ctx.globalAlpha=alpha
  // Main gradient fill
  const g=ctx.createLinearGradient(px,py,px,py+sz)
  g.addColorStop(0,co.light); g.addColorStop(.35,co.base)
  g.addColorStop(.7,co.mid); g.addColorStop(1,co.dark)
  ctx.fillStyle=g
  rrect(ctx,px+.5,py+.5,sz-1,sz-1,r); ctx.fill()
  // Inner white border
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1
  rrect(ctx,px+1.5,py+1.5,sz-3,sz-3,r-.5); ctx.stroke()
  // Shine (top highlight)
  const shineH=sz*.36
  ctx.globalAlpha=.45
  const sg=ctx.createLinearGradient(px,py,px,py+shineH)
  sg.addColorStop(0,'rgba(255,255,255,.45)'); sg.addColorStop(1,'rgba(255,255,255,0)')
  ctx.fillStyle=sg
  rrect(ctx,px+2,py+2,sz-4,shineH,[r-1,r-1,0,0]); ctx.fill()
  // Shadow (bottom)
  ctx.globalAlpha=.3
  const bg=ctx.createLinearGradient(px,py+sz*.67,px,py+sz)
  bg.addColorStop(0,'rgba(0,0,0,0)'); bg.addColorStop(1,'rgba(0,0,0,.2)')
  ctx.fillStyle=bg
  rrect(ctx,px+2,py+sz*.67,sz-4,sz*.31,[0,0,r-1,r-1]); ctx.fill()
  ctx.globalAlpha=1
  // Selection highlight
  if(sel){
    ctx.globalAlpha=.4*alpha; ctx.fillStyle='#fff'
    rrect(ctx,px+.5,py+.5,sz-1,sz-1,r); ctx.fill()
    ctx.globalAlpha=.9*alpha; ctx.strokeStyle='#fff'; ctx.lineWidth=2
    rrect(ctx,px+1,py+1,sz-2,sz-2,r); ctx.stroke()
  }
  ctx.restore()
}

// ═══════════════════════════════════════════════════
// SOUND SYSTEM
// ═══════════════════════════════════════════════════
let audioCtx = null

function createAudioCtx(){
  try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)() }catch{ audioCtx=null; soundOn=false; updateSoundBtn() }
  if(audioCtx){
    audioCtx.onstatechange=function(){
      if(audioCtx&&audioCtx.state==='interrupted') audioCtx.resume().catch(()=>{})
    }
  }
}

function initAudio(){
  if(!audioCtx && soundOn){
    createAudioCtx()
  }
  if(audioCtx){
    if(audioCtx.state==='suspended'||audioCtx.state==='interrupted'){
      audioCtx.resume().catch(()=>{})
    }else if(audioCtx.state==='closed'){
      audioCtx=null; createAudioCtx()
    }
  }
}

function playTone(freq,dur,vol,type){
  if(!soundOn) return
  if(!audioCtx||audioCtx.state==='closed'){ audioCtx=null; createAudioCtx() }
  if(!audioCtx) return
  if(audioCtx.state==='suspended'||audioCtx.state==='interrupted'){
    audioCtx.resume().catch(()=>{})
  }
  try{
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain()
    osc.type=type||'sine'; osc.frequency.value=freq
    const v=Math.min(vol,.3)
    gain.gain.setValueAtTime(v,audioCtx.currentTime)
    gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur)
    osc.connect(gain); gain.connect(audioCtx.destination)
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+dur)
  }catch{ audioCtx=null; createAudioCtx() }
}

// Resume audio after system wake-up or tab focus
document.addEventListener('visibilitychange',function(){
  if(!document.hidden) initAudio()
})
window.addEventListener('pageshow',function(){ initAudio() })

const sfx = {
  select(){ playTone(600,.06,.06,'sine') },
  swap(){ playTone(440,.08,.08,'sine'); setTimeout(()=>playTone(550,.08,.06,'sine'),40) },
  swapFail(){ playTone(300,.1,.06,'sine'); setTimeout(()=>playTone(250,.1,.05,'sine'),50) },
  remove(n){ const b=440+Math.min(n,20)*20,v=Math.min(.08+n*.008,.2); playTone(b,.25,v,'sine'); setTimeout(()=>playTone(b*1.5,.15,v*.5,'sine'),30); if(n>=5) setTimeout(()=>playTone(b*2,.12,v*.3,'sine'),60) },
  cascade(n){ const b=500+n*60; playTone(b,.15,.1,'sine'); setTimeout(()=>playTone(b*1.25,.15,.08,'sine'),60); setTimeout(()=>playTone(b*1.5,.2,.12,'sine'),120) },
  land(){ playTone(120,.1,.06,'triangle') },
  shuffle(){ playTone(350,.12,.06,'sine'); setTimeout(()=>playTone(420,.12,.05,'sine'),60); setTimeout(()=>playTone(350,.1,.04,'sine'),120) },
  levelComplete(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.2,.12,'sine'),i*70)) },
  gameOver(){ playTone(440,.3,.1,'sine'); setTimeout(()=>playTone(370,.3,.08,'sine'),200); setTimeout(()=>playTone(330,.5,.06,'sine'),400) },
  start(){ playTone(523,.15,.1,'sine'); setTimeout(()=>playTone(659,.15,.1,'sine'),100); setTimeout(()=>playTone(784,.2,.12,'sine'),200) },
  pause(){ playTone(500,.1,.06,'sine') },
  resume(){ playTone(600,.1,.06,'sine'); setTimeout(()=>playTone(700,.1,.05,'sine'),50) },
}

// ═══════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════
function spawnParticles(r,c,ci){
  const cx=GAP+c*CELL_FULL+CELL/2, cy=GAP+r*CELL_FULL+CELL/2
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, sp=40+Math.random()*100
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,ml:.3+Math.random()*.4,c:COLORS[ci].glow,s:2+Math.random()*3})
  }
}

function processNext(){
  if(!active||paused){ phase={type:'idle'}; return }
  const matches=findMatches(grid)
  if(matches.size===0){
    cascadeCount=0
    if(!hasValidMoves(grid)){
      const newGrid=fillGridNoMatches()
      const offsets=new Float32Array(ROWS*COLS*2)
      for(let i=0;i<offsets.length;i++) offsets[i]=(Math.random()-.5)*6
      phase={type:'shuffle',t0:performance.now(),dur:800,newGrid,offsets}
      showBonusText(l('noMoves')); sfx.shuffle(); return
    }
    phase={type:'idle'}; return
  }
  cascadeCount++
  const tgt=getLevelTarget(level)
  let tgtMatched=0
  matches.forEach(key=>{ const[r,c]=key.split(',').map(Number); if(grid[r][c]===tgt.colorIdx) tgtMatched++ })
  let pts=matches.size*10
  if(matches.size>=5) pts=matches.size*20
  else if(matches.size>=4) pts=matches.size*15
  if(cascadeCount>1) pts=Math.floor(pts*(1+(cascadeCount-1)*.5))
  score+=pts; collected+=tgtMatched; uiCollected=collected
  updateUI()
  if(cascadeCount>1){
    showBonusText(`${l('cascade')}${cascadeCount}! +${pts}`)
    sfx.cascade(cascadeCount)
    if(bonusTimeout) clearTimeout(bonusTimeout)
    bonusTimeout=setTimeout(()=>{
      showBonusText('')
      if(pendingLevelComplete){ pendingLevelComplete=false; document.getElementById('lcScore').textContent=l('score')+': '+score; sfx.levelComplete(); showOverlay('levelComplete') }
    },1200)
  }
  matches.forEach(key=>{ const[r,c]=key.split(',').map(Number); spawnParticles(r,c,grid[r][c]) })
  sfx.remove(matches.size)
  phase={type:'remove',cells:new Set(matches),t0:performance.now(),dur:280}
}

function afterRemove(){
  const ph=phase
  ph.cells.forEach(key=>{ const[r,c]=key.split(',').map(Number); grid[r][c]=null })
  const moves=applyGravity(grid)
  const spawned=fillEmpty(grid)
  phase={type:'fall',moves,spawned,t0:performance.now(),dur:250}
  if(moves.length>0||spawned.length>0) sfx.land()
}

function afterFall(){ processNext() }

function afterSwap(){
  const ph=phase
  if(ph.type!=='swap') return
  if(ph.valid){ processNext() }
  else{ const tmp=grid[ph.r1][ph.c1]; grid[ph.r1][ph.c1]=grid[ph.r2][ph.c2]; grid[ph.r2][ph.c2]=tmp; phase={type:'idle'} }
}

function afterShuffle(){
  const ph=phase
  if(ph.type!=='shuffle') return
  grid=ph.newGrid; phase={type:'idle'}; showBonusText('')
}

function checkLevelComplete(){
  if(active && uiCollected>=uiTargetCount && overlayState==='none'){
    active=false
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null }
    if(bonusTextStr){ pendingLevelComplete=true }
    else{ document.getElementById('lcScore').textContent=l('score')+': '+score; sfx.levelComplete(); showOverlay('levelComplete') }
  }
}

function startTimer(t){
  if(timerInterval) clearInterval(timerInterval)
  uiTime=t; updateUI()
  timerInterval=setInterval(()=>{
    uiTime--
    if(uiTime<=0){
      uiTime=0; active=false
      if(timerInterval){ clearInterval(timerInterval); timerInterval=null }
      const res=addLB(score,level)
      document.getElementById('goLB').innerHTML=`<div class="lbTitle">${l('leaderboard')}</div>`+buildLBHTML(res.lb,res.hi)
      sfx.gameOver(); showOverlay('gameover')
    }
    updateUI()
  },1000)
}

// CLICK HANDLER
// ═══════════════════════════════════════════════════
cv.addEventListener('click', e=>{
  initAudio()
  if(!active||phase.type!=='idle'||paused) return
  const rect=cv.getBoundingClientRect()
  const sx=cv.width/rect.width, sy=cv.height/rect.height
  const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy
  const c=Math.floor((mx-GAP)/CELL_FULL), r=Math.floor((my-GAP)/CELL_FULL)
  if(r<0||r>=ROWS||c<0||c>=COLS) return
  if(!selected){ selected={r,c}; sfx.select(); return }
  if(selected.r===r&&selected.c===c){ selected=null; return }
  const dr=Math.abs(selected.r-r), dc=Math.abs(selected.c-c)
  if((dr===1&&dc===0)||(dr===0&&dc===1)){
    const tmp=grid[selected.r][selected.c]; grid[selected.r][selected.c]=grid[r][c]; grid[r][c]=tmp
    const valid=findMatches(grid).size>0
    const r1=selected.r,c1=selected.c
    selected=null
    phase={type:'swap',r1,c1,r2:r,c2:c,t0:performance.now(),dur:valid?120:200,valid}
    if(valid) sfx.swap(); else sfx.swapFail()
  }else{ selected={r,c}; sfx.select() }
})

// ═══════════════════════════════════════════════════
// TOUCH HANDLER
// ═══════════════════════════════════════════════════
let touchStartR=-1, touchStartC=-1, touchStartX=0, touchStartY=0

function touchToGrid(touch){
  const rect=cv.getBoundingClientRect()
  const sx=cv.width/rect.width, sy=cv.height/rect.height
  const mx=(touch.clientX-rect.left)*sx, my=(touch.clientY-rect.top)*sy
  const c=Math.floor((mx-GAP)/CELL_FULL), r=Math.floor((my-GAP)/CELL_FULL)
  if(r<0||r>=ROWS||c<0||c>=COLS) return null
  return {r,c}
}

function trySwap(r1,c1,r2,c2){
  const dr=Math.abs(r1-r2), dc=Math.abs(c1-c2)
  if(!((dr===1&&dc===0)||(dr===0&&dc===1))) return false
  const tmp=grid[r1][c1]; grid[r1][c1]=grid[r2][c2]; grid[r2][c2]=tmp
  const valid=findMatches(grid).size>0
  selected=null
  phase={type:'swap',r1,c1,r2,c2,t0:performance.now(),dur:valid?120:200,valid}
  if(valid) sfx.swap(); else sfx.swapFail()
  return true
}

cv.addEventListener('touchstart', e=>{
  e.preventDefault()
  initAudio()
  if(!active||phase.type!=='idle'||paused) return
  if(e.touches.length===0) return
  const t=e.touches[0]
  const cell=touchToGrid(t)
  if(!cell) return
  touchStartR=cell.r; touchStartC=cell.c
  touchStartX=t.clientX; touchStartY=t.clientY
}, {passive:false})

cv.addEventListener('touchmove', e=>{
  e.preventDefault()
}, {passive:false})

cv.addEventListener('touchend', e=>{
  e.preventDefault()
  if(!active||phase.type!=='idle'||paused) return
  if(touchStartR<0) return
  const t=e.changedTouches[0]
  if(!t) return

  const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY
  const rect=cv.getBoundingClientRect()
  const threshold=rect.width/(COLS*2)
  const absDx=Math.abs(dx), absDy=Math.abs(dy)

  if(absDx>threshold||absDy>threshold){
    let sr, sc
    if(absDx>absDy){
      sr=touchStartR; sc=touchStartC+(dx>0?1:-1)
    }else{
      sr=touchStartR+(dy>0?1:-1); sc=touchStartC
    }
    if(sr>=0&&sr<ROWS&&sc>=0&&sc<COLS){
      trySwap(touchStartR, touchStartC, sr, sc)
    }
  }else{
    const cell=touchToGrid(t)
    if(!cell){ touchStartR=-1; return }
    const r=cell.r, c=cell.c
    if(!selected){ selected={r,c}; sfx.select(); touchStartR=-1; return }
    if(selected.r===r&&selected.c===c){ selected=null; touchStartR=-1; return }
    const dr=Math.abs(selected.r-r), dc=Math.abs(selected.c-c)
    if((dr===1&&dc===0)||(dr===0&&dc===1)){
      trySwap(selected.r, selected.c, r, c)
    }else{ selected={r,c}; sfx.select() }
  }
  touchStartR=-1
}, {passive:false})

// ═══════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════
const vo = Array.from({length:ROWS},()=>new Array(COLS).fill(null))
function clearVo(){ for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) vo[r][c]=null }
function setVo(r,c,v){ vo[r][c]=v }

let lastT=performance.now()
function render(now){
  const dt=Math.min((now-lastT)/1000,.05); lastT=now
  const ph=phase

  if(!paused){
    if(ph.type==='remove' && now-ph.t0>=ph.dur) afterRemove()
    else if(ph.type==='fall' && now-ph.t0>=ph.dur) afterFall()
    else if(ph.type==='swap' && now-ph.t0>=ph.dur) afterSwap()
    else if(ph.type==='shuffle' && now-ph.t0>=ph.dur) afterShuffle()
  }

  // Check level completion
  if(active && !paused && uiCollected>=uiTargetCount && overlayState==='none'){
    checkLevelComplete()
  }

  // Update particles
  let w=0
  for(let i=0;i<particles.length;i++){
    const p=particles[i]
    if(!paused){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=250*dt; p.life-=dt/p.ml }
    if(p.life>0) particles[w++]=p
  }
  particles.length=w

  // Draw
  ctx.clearRect(0,0,BW,BH)
  ctx.fillStyle='#0e0e14'; ctx.fillRect(0,0,BW,BH)
  ctx.strokeStyle='rgba(255,255,255,.025)'; ctx.lineWidth=1
  for(let r=0;r<=ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,GAP/2+r*CELL_FULL); ctx.lineTo(BW,GAP/2+r*CELL_FULL); ctx.stroke() }
  for(let c=0;c<=COLS;c++){ ctx.beginPath(); ctx.moveTo(GAP/2+c*CELL_FULL,0); ctx.lineTo(GAP/2+c*CELL_FULL,BH); ctx.stroke() }

  const g=grid, sel=selected
  const ease=t=>t*(2-t)
  clearVo()

  if(ph.type==='swap'){
    const prog=ease(Math.min((now-ph.t0)/ph.dur,1))
    setVo(ph.r1,ph.c1,{dx:(ph.c2-ph.c1)*CELL_FULL*(1-prog),dy:(ph.r2-ph.r1)*CELL_FULL*(1-prog),alpha:1,scale:1})
    setVo(ph.r2,ph.c2,{dx:(ph.c1-ph.c2)*CELL_FULL*(1-prog),dy:(ph.r1-ph.r2)*CELL_FULL*(1-prog),alpha:1,scale:1})
  }
  if(ph.type==='remove'){
    const prog=Math.min((now-ph.t0)/ph.dur,1)
    ph.cells.forEach(key=>{ const[r,c]=key.split(',').map(Number); setVo(r,c,{dx:0,dy:0,alpha:1-prog,scale:1-prog*.3}) })
  }
  if(ph.type==='fall'){
    const prog=ease(Math.min((now-ph.t0)/ph.dur,1))
    ph.moves.forEach(m=>setVo(m.toRow,m.col,{dx:0,dy:(m.fromRow-m.toRow)*CELL_FULL*(1-prog),alpha:1,scale:1}))
    ph.spawned.forEach(s=>setVo(s.row,s.col,{dx:0,dy:(s.fromAbove-s.row)*CELL_FULL*(1-prog),alpha:1,scale:1}))
  }
  if(ph.type==='shuffle'){
    const prog=Math.min((now-ph.t0)/ph.dur,1)
    if(prog<.5){
      const p=prog/.5
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) setVo(r,c,{dx:0,dy:0,alpha:1-p,scale:1-p*.4})
    }else{
      const p=(prog-.5)/.5, ng=ph.newGrid, off=ph.offsets
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        if(ng[r][c]!==undefined&&ng[r][c]!==null){
          const idx=(r*COLS+c)*2
          setVo(r,c,{dx:off[idx]*(1-p),dy:off[idx+1]*(1-p),alpha:p,scale:.6+p*.4})
        }
      }
    }
  }

  const currentGrid=(ph.type==='shuffle'&&(now-ph.t0)/ph.dur>=.5)?ph.newGrid:g
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const val=currentGrid[r][c]
      if(val===undefined||val===null) continue
      const off=vo[r][c], sc=off?.scale??1, cellSz=CELL*sc, offsetPx=(CELL-cellSz)/2
      const px=GAP+c*CELL_FULL+(off?.dx||0)+offsetPx
      const py=GAP+r*CELL_FULL+(off?.dy||0)+offsetPx
      const alpha=off?.alpha??1
      const isSel=sel!==null&&sel.r===r&&sel.c===c
      drawCube(ctx,px,py,val,cellSz,isSel,alpha)
    }
  }

  if(sel&&active&&!paused){
    ctx.save()
    const sx=GAP+sel.c*CELL_FULL, sy=GAP+sel.r*CELL_FULL
    const pulse=.5+.5*Math.sin(now*.005)
    ctx.globalAlpha=.4+.3*pulse; ctx.strokeStyle='#fff'; ctx.lineWidth=2.5
    ctx.shadowColor='#fff'; ctx.shadowBlur=8+4*pulse
    rrect(ctx,sx+1,sy+1,CELL-2,CELL-2,4); ctx.stroke()
    ctx.restore()
  }

  for(let i=0;i<particles.length;i++){
    const p=particles[i]
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life)*.8
    ctx.fillStyle=`rgb(${p.c[0]},${p.c[1]},${p.c[2]})`
    ctx.beginPath(); ctx.arc(p.x,p.y,p.s*Math.max(0,p.life),0,Math.PI*2); ctx.fill()
    ctx.restore()
  }

  if(ph.type==='shuffle'){
    ctx.save()
    const prog=Math.min((now-ph.t0)/ph.dur,1)
    ctx.globalAlpha=prog<.5?1:1-(prog-.5)/.5
    ctx.fillStyle='#fce4a8'; ctx.font='bold 16px "Inter",sans-serif'
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.shadowColor='rgba(252,228,168,.6)'; ctx.shadowBlur=12
    ctx.fillText(l('noMoves'),BW/2,BH/2)
    ctx.shadowBlur=0; ctx.restore()
  }

  requestAnimationFrame(render)
}

  lang=lang==='ru'?'en':'ru'
  try{ localStorage.setItem(LANG_KEY,lang) }catch{}
  document.getElementById('btnLang').textContent=lang==='ru'?'EN':'RU'
  document.title='MATCH 3'
  updateUI()
  // Rebuild start screen leaderboard
  if(overlayState==='start'){
    document.getElementById('startLB').innerHTML=`<div class="lbTitle">${l('leaderboard')}</div>`+buildLBHTML(loadLB(),-1)
  }
})

document.getElementById('btnSound').addEventListener('click',()=>{
  soundOn=!soundOn
  try{ localStorage.setItem(SOUND_KEY,soundOn?'on':'off') }catch{}
  updateSoundBtn()
  if(soundOn) initAudio()
})

document.getElementById('btnPause').addEventListener('click',()=>{
  togglePause()
})

document.getElementById('pauseOverlay').addEventListener('click',()=>{
  if(paused) togglePause()
})

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
try{ const s=localStorage.getItem(LANG_KEY); if(s==='en'||s==='ru') lang=s }catch{}
try{ if(localStorage.getItem(SOUND_KEY)==='off') soundOn=false }catch{}
document.getElementById('btnLang').textContent=lang==='ru'?'EN':'RU'
document.title='MATCH 3'
updateSoundBtn()
updatePauseBtn()
renderTitle()

grid=fillGridNoMatches()
const initTgt=getLevelTarget(1)
uiTargetCount=initTgt.count; uiTargetColor=initTgt.colorIdx

document.getElementById('startLB').innerHTML=`<div class="lbTitle">${l('leaderboard')}</div>`+buildLBHTML(loadLB(),-1)

updateUI()
cv.style.cursor='pointer'

requestAnimationFrame(render)
</script>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
